# Templates de mensagens usadas no envio.
#
# Copie este arquivo para:
# config/messages.yml
#
# Contexto:
# Leads interessados em cursos de ensino superior EAD.
#
# Placeholders disponíveis:
# - {greeting}
# - {first_name}
# - {full_name}
# - {course_interest}
# - {duration_interest}
#
# Observação:
# A saudação deve ser escolhida aleatoriamente pelo message_renderer.py.
# Exemplo: Oi, Olá, Oi!, Olá!, Bom dia, Boa tarde.

greeting_variations:
  - Oi
  - Olá
  - Oi!
  - Olá!
  - Bom dia
  - Boa tarde
  - Boa noite

messages:
  - id: ead_continuidade_01
    enabled: true
    weight: 1
    text: |
      {greeting}, {first_name}. Tudo bem?

      Vi que você demonstrou interesse no curso de {course_interest}, com duração aproximada de {duration_interest}.

      Estou entrando em contato para saber se você precisa de ajuda para dar continuidade na sua inscrição.

  - id: ead_continuidade_02
    enabled: true
    weight: 1
    text: |
      {greeting}, {first_name}. Aqui é da equipe de atendimento.

      Recebemos seu interesse no curso de {course_interest}, com duração aproximada de {duration_interest}.

      Posso te ajudar a continuar o processo e entender os próximos passos?

  - id: ead_continuidade_03
    enabled: true
    weight: 1
    text: |
      {greeting}, {first_name}. Tudo certo?

      Você demonstrou interesse em {course_interest}, curso com duração aproximada de {duration_interest}.

      Gostaria de saber se ainda faz sentido te ajudar a dar continuidade na sua inscrição.

  - id: ead_continuidade_04
    enabled: true
    weight: 1
    text: |
      {greeting}, {first_name}.

      Vi seu cadastro de interesse para {course_interest}, com duração aproximada de {duration_interest}.

      Estou passando para verificar se você precisa de apoio para seguir com a inscrição ou tirar alguma dúvida.

  - id: ead_continuidade_05
    enabled: true
    weight: 1
    text: |
      {greeting}, {first_name}. Como vai?

      Seu interesse no curso de {course_interest}, com duração aproximada de {duration_interest}, ficou registrado em nossa vitrine.

      Posso te orientar para dar continuidade no atendimento?