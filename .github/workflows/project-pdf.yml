name: Project PDF

on:
  push:
    branches:
      - main
    paths:
      - index.html
      - scripts/generate_project_pdf.py
      - .github/workflows/project-pdf.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: Generate project overview PDF
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install PDF dependencies
        run: |
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Generate PDF
        run: python scripts/generate_project_pdf.py

      - name: Commit updated PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update project overview pdf"
          file_pattern: project-overview.pdf
